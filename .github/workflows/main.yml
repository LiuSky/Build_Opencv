name: 编译OpenCV-iOS13-完整版(含OC)

on:
  workflow_dispatch:

jobs:
  build-opencv:
    runs-on: macos-15
    # --- 关键修复：显式声明权限 ---
    permissions:
      contents: write  # 允许 Actions 创建 Release 并上传文件
    # ---------------------------

    steps:
      - name: 1. 环境检查与指定 Xcode 16.4
        run: |
          echo "==== 系统信息 ===="
          sw_vers
          uname -m
          echo "==== 指定 Xcode 16.1 ===="
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: 2. 拉取 OpenCV 源码 (4.12.0)
        uses: actions/checkout@v4
        with:
          repository: opencv/opencv
          ref: 4.12.0
          path: opencv_source
          fetch-depth: 1

      - name: 3. 强力破解脚本并开始编译
        run: |
          mkdir -p output
          # 修改脚本防止 i386 报错
          sed -i '' 's/\["i386", "x86_64"\]/\[\]/g' opencv_source/platforms/ios/build_framework.py
          sed -i '' 's/targets = self.get_default_targets()/targets = [("iphoneos", "arm64")]/g' opencv_source/platforms/ios/build_framework.py
          
          python3 opencv_source/platforms/ios/build_framework.py output \
            --opencv opencv_source \
            --iphoneos_archs arm64 \
            --iphonesimulator_archs "" \
            --build_only_specified_archs \
            --iphoneos_deployment_target 13.0 \
            --without dnn \
            --without java \
            --without js \
            --without python_bindings_generator
          
      - name: 4. 检查文件大小
        run: |
          # 检查真正的二进制文件路径
          REAL_BINARY="output/opencv2.framework/Versions/A/opencv2"
          if [ -f "$REAL_BINARY" ]; then
            echo "==== 最终二进制文件路径: $REAL_BINARY ===="
            ls -lh "$REAL_BINARY"
          else
            echo "警告: 尝试查找根目录..."
            REAL_BINARY="output/opencv2.framework/opencv2"
            if [ -f "$REAL_BINARY" ]; then
               ls -lh "$REAL_BINARY"
            else
               echo "错误: 彻底找不到生成的二进制文件"
               find output -maxdepth 5 -name "opencv2"
               exit 1
            fi
          fi

      - name: 5. 压缩 Framework
        run: |
          cd output
          zip -r ../opencv2_ios13_full_objc.zip opencv2.framework

      - name: 6. 上传到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v4.11.0-ios13-full
          name: OpenCV 4.11.0 iOS 13 (完整OC版 - 未瘦身)
          files: opencv2_ios13_full_objc.zip
          body: |
            ### 编译说明
            - **版本**: OpenCV 4.11.0
            - **特点**: **未瘦身 (No Strip)**，包含完整符号表。
            - **包含内容**: 保留了 Objective-C 包装层及所有核心算法模块。
            - **最低支持**: iOS 13.0
            - **架构**: arm64 (仅真机)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
