name: 编译OpenCV-iOS13-极致精简版

on:
  workflow_dispatch:

jobs:
  build-opencv:
    runs-on: macos-latest

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          repository: opencv/opencv
          ref: 4.x
          path: opencv_source
          fetch-depth: 1

      - name: 配置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 开始编译 (Objective-C++ 模式)
        run: |
          mkdir -p output
          
          # 排除项说明：
          # dnn: 最大的模块，移除
          # java, js, python: 绑定层，移除
          # objc_bindings_generator: OC封装层，移除 (我们改用 .mm 调用)
          python3 opencv_source/platforms/ios/build_framework.py output \
            --iphoneos_archs arm64 \
            --iphoneos_deployment_target 13.0 \
            --without dnn,java,js,python_bindings_generator,objc_bindings_generator
          
      - name: 剥离符号表 (Strip)
        run: |
          FRAMEWORK_PATH="output/opencv2.framework/opencv2"
          # 这一步能大幅减小体积，使其稳稳地在 100MB 以下
          strip -S $FRAMEWORK_PATH
          echo "最终二进制大小:"
          ls -lh $FRAMEWORK_PATH

      - name: 压缩并上传到Release
        run: |
          cd output
          zip -r ../opencv2_ios13_cpp.zip opencv2.framework

      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v4.x-ios13-cpp
          name: OpenCV iOS 13 (C++ 核心版)
          files: opencv2_ios13_cpp.zip
          body: |
            ### 极致优化版说明
            - **架构**: arm64 (iOS 13.0+)
            - **模式**: 纯 C++ 核心 (请使用 .mm 文件调用)
            - **已剔除**: DNN, 所有语言绑定层 (含 OC 封装)
            - **优势**: 体积最小, 性能最高, 接口最全
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
