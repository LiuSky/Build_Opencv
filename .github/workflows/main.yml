name: 编译OpenCV-iOS13-含OC支持

on:
  workflow_dispatch:

jobs:
  build-opencv:
    runs-on: macos-15

    steps:
      - name: 1. 打印环境信息
        run: |
          echo "==== 系统信息 ===="
          sw_vers
          uname -m
          echo "==== 指定 Xcode 16.4 ===="
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: 2. 拉取 OpenCV 源码 (4.12.0)
        uses: actions/checkout@v4
        with:
          repository: opencv/opencv
          ref: 4.12.0
          path: opencv_source
          fetch-depth: 1

      - name: 3. 开始编译 (修复 i386 优化检查错误)
        run: |
          mkdir -p output
          
          # 核心修复点：
          # 1. 使用 --iphonesimulator_archs "" 确保不构建模拟器。
          # 2. 通过 --cmake_option 强制指定 CPU_BASELINE。
          #    针对 arm64，我们指定使用 NEON 指令集。
          #    这样 CMake 就不会去尝试检测那些已经不存在的 i386 指令集。
          
          python3 opencv_source/platforms/ios/build_framework.py output \
            --iphoneos_archs arm64 \
            --iphonesimulator_archs "" \
            --iphoneos_deployment_target 13.0 \
            --cmake_option "-DCPU_BASELINE=NEON" \
            --cmake_option "-DCPU_DISPATCH=NEON" \
            --without dnn \
            --without java \
            --without js \
            --without python_bindings_generator
          
      - name: 4. 深度瘦身 (Strip)
        run: |
          # 自动定位生成的二进制文件
          FRAMEWORK_BIN=$(find output -name "opencv2" -type f | grep "opencv2.framework/opencv2")
          if [ -f "$FRAMEWORK_BIN" ]; then
            echo "==== Strip 前文件信息 ===="
            ls -lh $FRAMEWORK_BIN
            
            # 剥离符号表和调试信息
            strip -S $FRAMEWORK_BIN
            
            echo "==== Strip 后文件信息 ===="
            ls -lh $FRAMEWORK_BIN
          else
            echo "错误: 未找到二进制文件"
            find output -maxdepth 5
            exit 1
          fi

      - name: 5. 打包并上传
        run: |
          cd output
          zip -r ../opencv2_ios13_objc.zip opencv2.framework

      - name: 6. 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v4.11.0-ios13-objc
          name: OpenCV 4.11.0 iOS 13 (含OC支持 - 修复i386错误)
          files: opencv2_ios13_objc.zip
          body: |
            ### 编译说明
            - **修复错误**: 解决了 Xcode 16 环境下 i386 架构指令检查失败的问题。
            - **包含内容**: 保留了 Objective-C 绑定层和所有核心算法模块。
            - **已移除**: DNN, Java, JS, Python。
            - **架构**: arm64 (iOS 13.0+)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
