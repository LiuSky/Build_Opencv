name: 编译OpenCV-iOS13-极致精简版

on:
  workflow_dispatch: # 手动触发

jobs:
  build-opencv:
    # 使用 macos-15 (确保是 M1/M2 芯片节点，编译更快且更符合当前环境)
    runs-on: macos-15

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          repository: opencv/opencv
          ref: 4.x
          path: opencv_source
          fetch-depth: 1

      - name: 配置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 开始编译 (仅arm64真机, 移除i386)
        run: |
          mkdir -p output
          
          # 核心修复说明：
          # 1. --iphoneos_archs arm64: 明确指定只编译真机架构
          # 2. --iphonesimulator_archs "": 明确指定【不】编译模拟器架构，防止出现 i386 报错
          # 3. 每一个模块单独使用 --without，防止 CMake 识别字符串成一坨
          
          python3 opencv_source/platforms/ios/build_framework.py output \
            --iphoneos_archs arm64 \
            --iphonesimulator_archs "" \
            --iphoneos_deployment_target 13.0 \
            --without dnn \
            --without java \
            --without js \
            --without python_bindings_generator \
            --without objc_bindings_generator \
            --without videoio \
            --without gapi
          
      - name: 剥离符号表 (Strip)
        run: |
          FRAMEWORK_PATH="output/opencv2.framework/opencv2"
          # 检查文件是否存在
          if [ -f "$FRAMEWORK_PATH" ]; then
            echo "优化前文件大小:"
            ls -lh $FRAMEWORK_PATH
            strip -S $FRAMEWORK_PATH
            echo "优化后文件大小:"
            ls -lh $FRAMEWORK_PATH
          else
            echo "错误: 找不到编译后的二进制文件 $FRAMEWORK_PATH"
            exit 1
          fi

      - name: 压缩并上传到Release
        run: |
          cd output
          zip -r ../opencv2_ios13_cpp.zip opencv2.framework

      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v4.x-ios13-cpp
          name: OpenCV iOS 13 (C++ 核心版)
          files: opencv2_ios13_cpp.zip
          body: |
            ### 极致优化版说明 (修复 i386 报错)
            - **架构**: 仅 arm64 (iOS 13.0+)
            - **模式**: 纯 C++ 核心
            - **已剔除**: DNN, 所有绑定层 (Java, JS, Python, ObjC)
            - **注意**: 编译已移除模拟器支持，仅支持真机。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
