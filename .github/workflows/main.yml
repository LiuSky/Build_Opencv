name: 编译OpenCV-iOS13-精简100MB版

on:
  workflow_dispatch:

jobs:
  build-opencv:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: 1. 环境检查与指定 Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version
          python3 --version

      - name: 2. 拉取 OpenCV 源码 (4.12.0)
        uses: actions/checkout@v4
        with:
          repository: opencv/opencv
          ref: 4.12.0
          path: opencv_source
          fetch-depth: 1

      - name: 3. 修正 OpenCV iOS 构建脚本
        run: |
          set -euo pipefail

          # OpenCV 的 ObjC 生成脚本使用 /usr/bin/env python，GitHub Runner 上统一改成 python3。
          find opencv_source -name '*.py' -type f -exec perl -0pi -e 's@^#!/usr/bin/env python$@#!/usr/bin/env python3@m; s@^#!/usr/bin/python$@#!/usr/bin/env python3@m' {} +

          # 修改脚本防止 i386 报错，并只编译 iphoneos arm64。
          sed -i '' 's/\["i386", "x86_64"\]/\[\]/g' opencv_source/platforms/ios/build_framework.py
          sed -i '' 's/targets = self.get_default_targets()/targets = [("iphoneos", "arm64")]/g' opencv_source/platforms/ios/build_framework.py

          # 官方 build_framework.py 没有外部 CMake 参数入口，这里只给本次构建加一个环境变量入口。
          perl -0pi -e 's/cmakecmd\.append\(dir\)\n        cmakecmd\.extend\(cmakeargs\)/extra_args = os.environ.get("YK_OPENCV_EXTRA_CMAKE_ARGS", "")\n        if extra_args:\n            cmakecmd.extend(extra_args.split("\\n"))\n        cmakecmd.append(dir)\n        cmakecmd.extend(cmakeargs)/' opencv_source/platforms/ios/build_framework.py

      - name: 4. 编译干净 OpenCV framework
        run: |
          set -euo pipefail
          mkdir -p output

          SANITIZE_FLAGS="-g0 -ffile-prefix-map=${GITHUB_WORKSPACE}=YKBuild/OpenCV -fdebug-prefix-map=${GITHUB_WORKSPACE}=YKBuild/OpenCV -fmacro-prefix-map=${GITHUB_WORKSPACE}=YKBuild/OpenCV"
          SANITIZE_FLAGS="${SANITIZE_FLAGS} -ffile-prefix-map=${GITHUB_WORKSPACE}/opencv_source=YKBuild/OpenCV/opencv -fdebug-prefix-map=${GITHUB_WORKSPACE}/opencv_source=YKBuild/OpenCV/opencv -fmacro-prefix-map=${GITHUB_WORKSPACE}/opencv_source=YKBuild/OpenCV/opencv"
          export CFLAGS="${SANITIZE_FLAGS}"
          export CXXFLAGS="${SANITIZE_FLAGS}"
          export OBJCFLAGS="${SANITIZE_FLAGS}"
          export OBJCXXFLAGS="${SANITIZE_FLAGS}"

          export YK_OPENCV_EXTRA_CMAKE_ARGS="$(cat <<EOF
          -DCV_TRACE=OFF
          -DOPENCV_TRACE=OFF
          -DENABLE_LTO=OFF
          -DENABLE_THIN_LTO=OFF
          -DBUILD_WITH_DEBUG_INFO=OFF
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF
          -DCMAKE_XCODE_ATTRIBUTE_ENABLE_BITCODE=NO
          -DCMAKE_C_FLAGS=${SANITIZE_FLAGS}
          -DCMAKE_CXX_FLAGS=${SANITIZE_FLAGS}
          -DCMAKE_OBJC_FLAGS=${SANITIZE_FLAGS}
          -DCMAKE_OBJCXX_FLAGS=${SANITIZE_FLAGS}
          -DCMAKE_C_FLAGS_RELEASE=-DNDEBUG -O3 ${SANITIZE_FLAGS}
          -DCMAKE_CXX_FLAGS_RELEASE=-DNDEBUG -O3 ${SANITIZE_FLAGS}
          -DCMAKE_OBJC_FLAGS_RELEASE=-DNDEBUG -O3 ${SANITIZE_FLAGS}
          -DCMAKE_OBJCXX_FLAGS_RELEASE=-DNDEBUG -O3 ${SANITIZE_FLAGS}
          EOF
          )"

          # 策略：去掉不需要的大型模块以缩减体积
          # 保留：core, imgproc, imgcodecs, features2d, objc
          # 移除：dnn, stitching, ml, video, calib3d, gapi, photo
          python3 opencv_source/platforms/ios/build_framework.py output \
            --opencv opencv_source \
            --iphoneos_archs arm64 \
            --iphonesimulator_archs "" \
            --build_only_specified_archs \
            --disable-swift \
            --disable-bitcode \
            --iphoneos_deployment_target 13.0 \
            --without dnn \
            --without stitching \
            --without ml \
            --without video \
            --without calib3d \
            --without gapi \
            --without photo \
            --without java \
            --without js \
            --without python_bindings_generator

      - name: 5. 执行瘦身并扫描本地路径
        run: |
          set -euo pipefail
          REAL_BINARY="output/opencv2.framework/Versions/A/opencv2"
          if [ ! -f "$REAL_BINARY" ]; then
            echo "错误: 找不到二进制文件"
            exit 1
          fi

          echo "==== Strip 前大小 ===="
          ls -lh "$REAL_BINARY"
          strip -S "$REAL_BINARY"
          echo "==== Strip 后大小 ===="
          ls -lh "$REAL_BINARY"

          echo "==== 扫描 framework 本地路径 ===="
          ruby <<'RUBY'
          pattern = %r{/Users/|/private/var/folders/|/var/folders/|/tmp/yk-|/Desktop/|DerivedData|Build_Opencv}
          bad = []

          Dir.glob("output/opencv2.framework/**/*", File::FNM_DOTMATCH).each do |path|
            next unless File.file?(path)

            data = File.binread(path)
            match = data.match(pattern)
            next unless match

            start_at = [match.begin(0) - 80, 0].max
            end_at = [match.end(0) + 160, data.bytesize].min
            snippet = data.byteslice(start_at...end_at).gsub(/[^\x20-\x7e]/, ".")
            bad << "#{path}: #{snippet}"
          end

          if bad.any?
            puts "错误: OpenCV framework 仍包含本地路径，停止发布。"
            puts bad.first(50)
            exit 1
          end
          RUBY

      - name: 6. 压缩 Framework
        run: |
          set -euo pipefail
          cd output
          zip -r ../opencv2_ios13_100mb_objc.zip opencv2.framework

      - name: 7. 删除旧 Release 资产
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_NAME: opencv2_ios13_100mb_objc.zip
          TAG_NAME: v4.12.0-ios13-100mb
        run: |
          set -euo pipefail

          RELEASE_JSON="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" || true)"

          if [ -z "$RELEASE_JSON" ]; then
            echo "没有找到旧 Release，跳过删除旧资产。"
            exit 0
          fi

          ASSET_ID="$(printf '%s' "$RELEASE_JSON" | ruby -rjson -e 'j=JSON.parse(STDIN.read); a=j.fetch("assets", []).find { |x| x["name"] == ENV["ASSET_NAME"] }; puts a["id"] if a')"
          if [ -z "$ASSET_ID" ]; then
            echo "没有找到旧资产 ${ASSET_NAME}，跳过删除。"
            exit 0
          fi

          curl -fsSL -X DELETE \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}"
          echo "已删除旧资产 ${ASSET_NAME}。"

      - name: 8. 上传到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v4.12.0-ios13-100mb
          name: OpenCV 4.12.0 iOS 13 (OC版-约100MB)
          files: opencv2_ios13_100mb_objc.zip
          body: |
            ### 优化说明
            - **目标**: 体积控制在 100MB 左右，支持直接 Push 到 Git 仓库。
            - **包含**: Objective-C 包装层、Core、Imgproc、Features2d。
            - **移除**: DNN, Stitching, ML, Video, Calib3d, Photo 等。
            - **瘦身**: 已执行 `strip -S`，剔除调试符号。
            - **隐私**: 已关闭 OpenCV trace，添加 prefix-map，并在发布前扫描本地路径。
            - **架构**: arm64 (iOS 13.0+)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
