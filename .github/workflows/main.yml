name: 编译OpenCV-iOS13-完整版(含OC)

on:
  workflow_dispatch:

jobs:
  build-opencv:
    runs-on: macos-15

    steps:
      - name: 1. 环境检查与指定 Xcode 16.4
        run: |
          echo "==== 系统信息 ===="
          sw_vers
          uname -m
          echo "==== 指定 Xcode 16.1 ===="
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: 2. 拉取 OpenCV 源码 (4.12.0)
        uses: actions/checkout@v4
        with:
          repository: opencv/opencv
          ref: 4.12.0
          path: opencv_source
          fetch-depth: 1

      - name: 3. 开始编译 (保留 OC 绑定, 不进行瘦身)
        run: |
          mkdir -p output
          
          # 编译指令说明：
          # --iphoneos_archs arm64: 仅编译 64 位真机
          # --iphonesimulator_archs "": 跳过模拟器，解决 Xcode 16 的 i386 兼容报错
          # --build_only_specified_archs: 强制脚本只编译 arm64，不编译已过时的 armv7
          # --without: 仅移除 DNN 和 其它平台绑定，确保 OC 绑定层被编译
          
          python3 opencv_source/platforms/ios/build_framework.py output \
            --opencv opencv_source \
            --iphoneos_archs arm64 \
            --iphonesimulator_archs "" \
            --build_only_specified_archs \
            --iphoneos_deployment_target 13.0 \
            --without dnn \
            --without java \
            --without js \
            --without python_bindings_generator
          
      - name: 4. 检查文件大小 (不进行 Strip)
        run: |
          BINARY_PATH=$(find output -name "opencv2" -type f | grep "opencv2.framework/opencv2")
          if [ -f "$BINARY_PATH" ]; then
            echo "==== 最终二进制文件大小 ===="
            ls -lh "$BINARY_PATH"
          else
            echo "错误: 未能找到生成的二进制文件"
            find output -name "opencv2"
            exit 1
          fi

      - name: 5. 压缩 Framework
        run: |
          cd output
          # 压缩时保留所有内容
          zip -r ../opencv2_ios13_full_objc.zip opencv2.framework

      - name: 6. 上传到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v4.11.0-ios13-full
          name: OpenCV 4.11.0 iOS 13 (完整OC版 - 未瘦身)
          files: opencv2_ios13_full_objc.zip
          body: |
            ### 编译说明
            - **版本**: OpenCV 4.11.0
            - **特点**: **未瘦身 (No Strip)**，包含完整符号表。
            - **包含内容**: 保留了 Objective-C 包装层、Features2d、Stitching、Video、Calib3d 等所有核心模块。
            - **已移除**: 仅去除了 DNN 模块。
            - **架构**: arm64 (iOS 13.0+)
            - **警告**: 由于未瘦身，文件体积很大（预计 >300MB），请不要将其提交至 Git 仓库。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
